<html lang="ku" dir="rtl" id="root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<title>ڕێستۆرانتی ئاران </title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
/* ═══ THEMES ═══ */
:root {
  --bg:#0a0a0f; --card:#13131f; --bord:#26263a; --gold:#d4af37; --orange:#e67e22;
  --txt:#fef9e8; --muted:#8e8eaa; --overlay:rgba(0,0,0,.88); --tab-bg:rgba(10,10,15,.97);
  --hero:rgba(212,175,55,.18); --input-bg:#060609;
}
.theme-light {
  --bg:#f6f1e7; --card:#ffffff; --bord:#e2d5bc; --gold:#9a7408; --orange:#b04d0a;
  --txt:#1c1208; --muted:#7a6848; --overlay:rgba(0,0,0,.55); --tab-bg:rgba(246,241,231,.97);
  --hero:rgba(154,116,8,.13); --input-bg:#ede8de;
}
.theme-wine {
  --bg:#0c0308; --card:#190810; --bord:#3a1226; --gold:#f0b4c8; --orange:#e05878;
  --txt:#fce8f0; --muted:#a87080; --overlay:rgba(0,0,0,.88); --tab-bg:rgba(12,3,8,.97);
  --hero:rgba(240,180,200,.14); --input-bg:#0c0308;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Kufi Arabic',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--card)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.fade-up{animation:fadeUp .4s ease forwards}
.blink{animation:blink 2.5s ease-in-out infinite}

/* ═══ THEME UTILITIES ═══ */
.price-text{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800}
.hero-glow{background:radial-gradient(ellipse 80% 55% at 50% 0%,var(--hero) 0%,transparent 68%)}
.glow{text-shadow:0 0 32px var(--hero),0 0 12px var(--hero)}
.gold-grad{background:linear-gradient(135deg,var(--gold),var(--orange))}

/* ═══ CARDS ═══ */
.c-card{cursor:pointer;transition:transform .28s,box-shadow .28s,border-color .28s;-webkit-tap-highlight-color:transparent}
.c-card:active{transform:scale(.965)}
@media(hover:hover){
  .c-card:hover{transform:translateY(-5px);box-shadow:0 18px 36px rgba(0,0,0,.55),0 0 22px rgba(212,175,55,.14);border-color:var(--gold)!important}
  .c-card:hover .c-img{transform:scale(1.09)}
}
.c-img{transition:transform .5s;width:100%;height:100%;object-fit:cover;display:block}

/* ═══ TABS ═══ */
.tab{transition:all .22s;flex-shrink:0;white-space:nowrap;border-color:var(--bord)!important;color:var(--muted)!important}
.tab.on{background:var(--gold)!important;color:#0a0a0f!important;font-weight:700!important;border-color:var(--gold)!important}
.tab:not(.on):hover{border-color:var(--gold)!important;color:var(--gold)!important}

/* ═══ SECTIONS ═══ */
.sec{display:none}
.sec.on{display:block;animation:fadeUp .4s ease}

/* ═══ BADGES ═══ */
.b-hot{background:linear-gradient(135deg,#e67e22,#d4af37)}
.b-new{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.b-sp{background:linear-gradient(135deg,#9b59b6,#8e44ad)}

/* ═══ MODAL ═══ */
.modal-back{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:var(--overlay)}


/* ═══ LANG BTNS ═══ */
.lang-btn{border:1px solid var(--bord);color:var(--muted);background:transparent;border-radius:999px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'Noto Kufi Arabic',sans-serif;-webkit-tap-highlight-color:transparent}
.lang-btn.on{background:var(--gold);color:#0a0a0f;border-color:var(--gold);font-weight:700}

/* ═══ THEME DOTS ═══ */
.th-dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.th-dot.on{transform:scale(1.3);box-shadow:0 0 0 2px var(--gold)}

/* ═══ SCROLL ═══ */
.no-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:none}
.no-scroll::-webkit-scrollbar{display:none}



</style>
</head>
<body>

<!-- ═══════════ HERO ═══════════ -->
<div class="relative overflow-hidden">
  <div class="hero-glow absolute inset-0 pointer-events-none"></div>

  <!-- TOP BAR -->
  <div class="flex items-center justify-between px-3 pt-4 pb-1 gap-2 flex-wrap">

    <!-- lang -->
    <div class="flex gap-1.5">
      <button class="lang-btn on" id="btnKu" onclick="setLang('ku')">کوردی</button>
      <button class="lang-btn"    id="btnAr" onclick="setLang('ar')">عربي</button>
      <button class="lang-btn"    id="btnEn" onclick="setLang('en')">EN</button>
    </div>

    <!-- right controls -->
    <div class="flex items-center gap-2.5">
      <!-- theme dots -->
      <div class="flex gap-1.5 items-center">
        <button class="th-dot on" id="thDark"  onclick="setTheme('dark')"  style="background:#0a0a0f;border-color:#d4af37" title="تاریک"></button>
        <button class="th-dot"    id="thLight" onclick="setTheme('light')" style="background:#f6f1e7;border-color:#9a7408" title="ڕووناک"></button>
        <button class="th-dot"    id="thWine"  onclick="setTheme('wine')"  style="background:#190810;border-color:#f0b4c8" title="وایـن"></button>
      </div>
      <!-- open -->
      <div class="flex items-center gap-1">
        <span class="w-2 h-2 bg-green-500 rounded-full blink"></span>
        <span id="openTxt" class="text-[9px] font-display tracking-widest" style="color:var(--muted)">OPEN</span>
      </div>
    </div>
  </div>

  <!-- LOGO -->
  <div class="text-center px-4 pt-5 pb-10">
    <span id="heroTag" class="inline-block text-black text-[10px] font-display tracking-[3px] px-4 py-1.5 rounded-full mb-4 font-bold gold-grad">PREMIUM RESTAURANT</span>
    <h1 id="heroName" class="text-[70px] font-kurd font-black glow leading-none" style="color:var(--gold)">ئاران</h1>
    <p id="heroSub"   class="font-display tracking-[.3em] text-sm mt-1" style="color:var(--muted)">ARAN RESTAURANT</p>
    <div class="w-14 h-px mx-auto mt-4 mb-3" style="background:linear-gradient(90deg,transparent,var(--gold),transparent)"></div>
    <p id="heroLine" class="text-[11px] font-kurd" style="color:var(--muted)">تامێکی نوێ ، کاتێکی خۆش 🍽️</p>
  </div>
</div>

<!-- ═══════════ STICKY TABS ═══════════ -->
<div class="sticky top-0 z-50 border-b" style="background:var(--tab-bg);border-color:var(--bord)">
  <div class="overflow-x-auto no-scroll">
    <div id="tabsRow" class="flex gap-2 px-3 py-2.5 min-w-max"></div>
  </div>
</div>

<!-- ═══════════ CONTENT ═══════════ -->
<div class="max-w-xl mx-auto px-3 py-5 pb-10" id="contentArea"></div>

<!-- ═══════════ FOOTER ═══════════ -->
<footer class="border-t mt-4 py-8 text-center px-4" style="border-color:var(--bord)">
  <p id="ftName" class="font-black text-2xl font-kurd glow mb-1" style="color:var(--gold)">ئاران</p>
  <p id="ftTag"  class="text-[10px] font-display tracking-widest mb-3" style="color:var(--muted)">ARAN FAST FOOD RESTAURANT</p>
  <div class="flex flex-col items-center gap-1.5 text-[11px] font-kurd" style="color:var(--muted)">
    <span id="ftPhone">📞 07824806924</span>
    <span id="ftAddr">📍 رێگای گشتی رواندز - تەنیشت کۆسار پڵەس</span>
  </div>
  <p class="text-[9px] mt-4 font-display tracking-widest" style="color:var(--bord)">© 2025 ARAN RESTAURANT</p>
</footer>

<!-- ═══════════ ITEM MODAL ═══════════ -->
<div id="itemModal" class="fixed inset-0 z-[200] hidden items-end justify-center sm:items-center">
  <div class="modal-back absolute inset-0" onclick="closeItem()"></div>
  <div class="relative rounded-t-3xl sm:rounded-3xl w-full sm:max-w-sm overflow-hidden shadow-2xl" style="background:var(--card);border:1px solid var(--bord)">
    <div class="relative h-52">
      <img id="mImg" class="w-full h-full object-cover" src="" alt="" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80'"/>
      <div class="absolute inset-0" style="background:linear-gradient(to top,var(--card) 0%,transparent 60%)"></div>
      <div class="absolute top-2.5 left-1/2 -translate-x-1/2 w-9 h-1 rounded-full sm:hidden" style="background:rgba(255,255,255,.22)"></div>
      <button onclick="closeItem()" class="absolute top-3 left-3 w-8 h-8 rounded-full bg-black/60 text-white flex items-center justify-center text-sm">✕</button>
    </div>
    <div class="p-5">
      <div class="flex justify-between items-start gap-2 mb-2">
        <div class="min-w-0">
          <h2 id="mTitle" class="text-lg font-black font-kurd" style="color:var(--txt)"></h2>
          <p id="mSub"   class="text-[10px] font-display tracking-widest mt-0.5" style="color:var(--muted)"></p>
        </div>
        <div class="text-right flex-shrink-0">
          <span id="mPrice"    class="price-text font-black text-xl block"></span>
          <span id="mCurrency" class="text-[9px] font-display" style="color:var(--muted)">IQD</span>
        </div>
      </div>
      <p id="mDesc" class="text-xs font-kurd leading-loose" style="color:var(--muted)"></p>
      <button id="mCloseBtn" onclick="closeItem()" class="mt-4 w-full font-bold py-2.5 rounded-2xl font-kurd text-sm text-black gold-grad active:scale-95 transition-transform">داخستن ✓</button>
    </div>
  </div>
</div>

  {id:25,cat:'finger',ku:'ناگێت ١٢ دانە',ar:'ناجيتس ١٢ قطعة',en:'12 Nuggets',dku:'١٢ دانە ناگێت + سووس BBQ یان هاری',dar:'١٢ قطعة + صوص باربيكيو أو حار',den:'12 Nuggets + BBQ or Hot Sauce',price:6000,img:'https://images.unsplash.com/photo-1585325701954-7c7a006d5c62?w=400&q=80',badge:''},
  // DRINKS
  {id:26,cat:'drinks',ku:'کۆکا کۆلا',ar:'کوکا کولا',en:'Coca cola',dku:'کۆکا کۆلا',dar:'کوکا کولا',den:'Coca cola',price:500,img:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQk04xl7872_ApABiJjcTUdYxai3RS_8YASmw&s',badge:''},
  {id:27,cat:'drinks',ku:'مێلک شێیک',ar:'ميلك شيك',en:'Milkshake',dku:'شکلاتە / فراولە / فانیلا',dar:'شوكولاتة / فراولة / فانيلا',den:'Chocolate / Strawberry / Vanilla',price:3000,img:'https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=400&q=80',badge:'hot'},
  {id:28,cat:'drinks',ku:'نووشابە',ar:'مشروب غازي',en:'Soft Drink',dku:'پێپسی / سبرایت / میرینده',dar:'بيبسي / سبرايت / ميراندا',den:'Pepsi / Sprite / Miranda',price:1000,img:'https://images.unsplash.com/photo-1574706255030-4be439d73fce?w=400&q=80',badge:''},
];

const CATS = {
  burger:   {ku:'بەرگەر',    ar:'برغر',       en:'Burgers',        icon:'🍔'},
  pizza:    {ku:'پیتزا',     ar:'بيتزا',      en:'Pizza',          icon:'🍕'},
  fajita:   {ku:'فاهیتا',   ar:'فاهيتا',     en:'Fajita',         icon:'🌯'},
  sandwich: {ku:'ساندویج',  ar:'ساندويتش',   en:'Sandwich',       icon:'🥙'},
  beef:     {ku:'گەسی گۆشت',ar:'مشاوي لحم',  en:'Grilled Beef',   icon:'🥩'},
  chicken:  {ku:'گەسی مریشک',ar:'مشاوي دجاج',en:'Grilled Chicken',icon:'🍗'},
  finger:   {ku:'فینگەر',   ar:'فنجر',       en:'Finger Food',    icon:'🍟'},
  drinks:   {ku:'خواردنەوە',ar:'مشروبات',    en:'Drinks',         icon:'🥤'},
  
};

const BADGES = {
  hot:{ku:'داوا زۆر', ar:'الأكثر طلباً', en:'Popular'},
  new:{ku:'نوێ',       ar:'جديد',         en:'New'},
  sp: {ku:'تایبەت ⭐',ar:'مميز ⭐',      en:'Special ⭐'},
};

const UT = {
  ku:{
    openNow:'کراوەیە', tagline:'تامێکی نوێ، کاتی خۆش 🍽️',
    closeBtn:'داخستن ✓', noItems:'هیچ خواردنێک نییە', currency:'دینار عێراقی',
  },
  ar:{
    openNow:'مفتوح', tagline:'طعم جديد، وقت ممتع 🍽️',
    closeBtn:'إغلاق ✓', noItems:'لا توجد وجبات', currency:'دينار عراقي',
  },
  en:{
    openNow:'Open Now', tagline:'A New Taste, A Great Time 🍽️',
    closeBtn:'Close ✓', noItems:'No items', currency:'Iraqi Dinar',
  },
};

let lang      = 'ku';
let theme     = 'dark';
const items   = JSON.parse(JSON.stringify(DEF_ITEMS));
const info    = Object.assign({}, DEF_INFO);
let activeCat = 'burger';


const el   = id  => document.getElementById(id);
const t    = key => (UT[lang] || UT.ku)[key] || key;
const iN   = item => item[lang] || item.ku || item.en || '';
const iD   = item => item['d'+lang] || item.dku || item.den || '';
const cN   = cat  => (CATS[cat]||{})[lang] || (CATS[cat]||{}).ku || cat;

// ═══════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════
function setTheme(th) {
  theme = th;
  const root = el('root');
  root.className = th === 'dark' ? '' : 'theme-' + th;
  ['dark','light','wine'].forEach(x => {
    const d = el('th' + x.charAt(0).toUpperCase() + x.slice(1));
    if(d) { d.classList.toggle('on', x === th); }
  });
}

// ═══════════════════════════════════════════
//  LANGUAGE
// ═══════════════════════════════════════════
function setLang(l) {
  lang = l;
  const root = el('root');
  root.lang = l;
  root.dir  = l === 'en' ? 'ltr' : 'rtl';
  ['ku','ar','en'].forEach(x => el('btn'+x.charAt(0).toUpperCase()+x.slice(1))?.classList.toggle('on', x===l));
  renderAll();
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderAll() {
  renderHero();
  renderTabs();
  renderContent();
  renderFooter();
}

function renderHero() {
  const cap = lang.charAt(0).toUpperCase() + lang.slice(1);
  el('heroName').textContent = info['name'+cap] || info.nameKu;
  el('heroLine').textContent = t('tagline');
  el('openTxt').textContent  = t('openNow').toUpperCase();
}

function renderTabs() {
  const row = el('tabsRow');
  row.innerHTML = '';
  Object.entries(CATS).forEach(([key, cat]) => {
    if(!items.some(i => i.cat === key)) return;
    const btn = document.createElement('button');
    btn.className = 'tab text-[11px] font-kurd px-3.5 py-1.5 rounded-full border' + (key===activeCat?' on':'');
    btn.textContent = cat.icon + ' ' + cat[lang];
    btn.onclick = () => { activeCat = key; renderTabs(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); };
    row.appendChild(btn);
  });
}

function renderContent() {
  const area = el('contentArea');
  const cat  = CATS[activeCat] || {};
  const list = items.filter(i => i.cat === activeCat);

  let h = `<div class="flex items-center gap-3 mb-5">
    <span class="text-3xl">${cat.icon}</span>
    <div>
      <h2 class="text-xl font-black font-kurd" style="color:var(--gold)">${cat[lang]||cat.ku}</h2>
      <p class="text-[10px] font-display tracking-widest" style="color:var(--muted)">${(cat.en||'').toUpperCase()}</p>
    </div>
  </div>`;

  if(!list.length) {
    h += `<div class="text-center py-14" style="color:var(--muted)"><div class="text-5xl mb-3">🍽️</div><p class="font-kurd text-sm">${t('noItems')}</p></div>`;
  } else {
    h += '<div class="flex flex-col gap-3">';
    list.forEach(item => {
      const img = item.img || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80';
      const bHtml = item.badge ? `<span class="b-${item.badge} absolute top-2 right-2 text-white text-[9px] font-kurd font-bold px-2 py-0.5 rounded-full">${(BADGES[item.badge]||{})[lang]||''}</span>` : '';
      const sub = lang === 'en' ? (item.ku||'') : (item.en || item.ku);
      h += `<div class="c-card border rounded-2xl overflow-hidden flex" style="background:var(--card);border-color:var(--bord)" onclick="openItem(${item.id})">
        <div class="relative w-28 h-28 flex-shrink-0 overflow-hidden">
          <img class="c-img" src="${img}" alt="" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80'"/>
          ${bHtml}
        </div>
        <div class="flex-1 p-3 flex flex-col justify-between min-w-0">
          <div>
            <div class="flex justify-between items-start gap-1">
              <div class="min-w-0">
                <h3 class="font-bold text-sm font-kurd truncate" style="color:var(--txt)">${iN(item)}</h3>
                <p class="text-[9px] font-display tracking-wide mt-0.5" style="color:var(--muted)">${sub}</p>
              </div>
              <span class="price-text font-black text-base flex-shrink-0">${item.price.toLocaleString()}</span>
            </div>
            <p class="text-[11px] font-kurd mt-1.5 leading-relaxed line-clamp-2" style="color:var(--muted)">${iD(item)}</p>
          </div>
          <p class="text-[9px] font-display mt-1" style="color:var(--muted)">IQD • ${t('currency')}</p>
        </div>
      </div>`;
    });
    h += '</div>';
  }
  area.innerHTML = h;
}

function renderFooter() {
  const cap = lang.charAt(0).toUpperCase() + lang.slice(1);
  el('ftName').textContent = info['name'+cap] || info.nameKu;
  el('ftPhone').textContent = '📞 ' + info.phone;
  el('ftHours').textContent = '🕐 ' + info.hours;
  el('ftAddr').textContent  = '📍 ' + (info['addr'+cap] || info.addrKu);
}

// ═══════════════════════════════════════════
//  ITEM MODAL
// ═══════════════════════════════════════════
function openItem(id) {
  const item = items.find(i => i.id === id);
  if(!item) return;
  const img = item.img || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80';
  el('mImg').src     = img;
  el('mTitle').textContent    = iN(item);
  el('mSub').textContent      = lang === 'en' ? (item.ku||'') : (item.en || item.ku);
  el('mPrice').textContent    = item.price.toLocaleString() + ' ';
  el('mCurrency').textContent = t('currency');
  el('mDesc').textContent     = iD(item);
  el('mCloseBtn').textContent = t('closeBtn');
  const m = el('itemModal');
  m.classList.remove('hidden'); m.classList.add('flex');
  document.body.style.overflow = 'hidden';
}
function closeItem() {
  el('itemModal').classList.add('hidden');
  el('itemModal').classList.remove('flex');
  document.body.style.overflow = '';
}


// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => { if(e.key==='Escape') closeItem(); });

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
setTheme('dark');
renderAll();
</script>
</body>
</html>
